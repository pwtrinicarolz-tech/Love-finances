<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Finances</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

background:linear-gradient(135deg,#6C63FF,#B388FF,#FFD6E8);

background-size:300% 300%;

animation:fundo 12s ease infinite;

overflow:hidden;

}

@keyframes fundo{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

.container{

width:380px;
max-width:90%;

padding:40px;

text-align:center;

background:rgba(255,255,255,.18);

backdrop-filter:blur(18px);

border-radius:30px;

border:1px solid rgba(255,255,255,.3);

box-shadow:0 15px 40px rgba(0,0,0,.25);

position:relative;

z-index:2;

}

.logo{

width:210px;

background:white;

padding:15px;

border-radius:25px;

box-shadow:0 8px 20px rgba(0,0,0,.15);

margin-bottom:25px;

transition:.3s;

}

.logo:hover{

transform:scale(1.05);

}

h1{

font-size:34px;

margin-bottom:10px;

}

p{

margin-bottom:30px;

opacity:.9;

}

.botao{

display:block;

width:100%;

padding:15px;

margin:15px 0;

text-decoration:none;

font-size:18px;

font-weight:bold;

color:white;

border-radius:18px;

background:linear-gradient(90deg,#FF5DA2,#D64DFF);

transition:.3s;

}

.botao:hover{

transform:translateY(-3px);

box-shadow:0 10px 20px rgba(255,0,150,.35);

}

.botao.secundario{

background:white;

color:#7A3DFF;

}

.heart{

position:fixed;

font-size:28px;

opacity:.35;

animation:subir linear infinite;

pointer-events:none;

}

@keyframes subir{

from{

transform:translateY(110vh);

}

to{

transform:translateY(-120px);

}

}

footer{

margin-top:20px;

font-size:13px;

opacity:.8;

}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="Love Finances">

<h1>Love Finances</h1>

<p>
Seu aplicativo financeiro com amor.
</p>

<a href="login.html" class="botao">

Entrar

</a>

<a href="cadastro.html" class="botao secundario">

Criar Conta

</a>

<footer>

💖 Organize suas finanças de forma simples.

</footer>

</div>

<script>

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(5+Math.random()*8)+"s";

heart.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(heart);

}

</script>

</body>

</html>
